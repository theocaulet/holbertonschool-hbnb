<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="icon" href="images/logo.png">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <header class="site-header">
        <div class="header-left">
            <img src="images/logo.png" alt="Logo" class="logo">
            <span class="brand">HBnB</span>
        </div>
        <nav class="main-nav">
            <a href="index.html">Home</a>
            <a href="login.html" id="login-link" class="login-button">Login</a>
            <button id="logout-button" class="login-button" style="display:none;">Logout</button>
        </nav>
    </header>
    <main class="auth-layout">
        <form id="login-form">
            <h2>Login</h2>
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>

            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required>

            <button type="submit">Login</button>
        </form>
        <p id="login-error" class="error-message" aria-live="polite"></p>
    </main>
    <footer>
        <div class="footer-content">
            <div class="footer-section">
                <h3>About us</h3>
                <p>HBnB connects travelers with unique, design‑driven homes around the world.</p>
            </div>
            <div class="footer-section">
                <h3>Contact us</h3>
                <p>Email: support@hbnb.com<br>Phone: +1 (555) 123-4567</p>
            </div>
        </div>
        <p class="footer-copy">All rights reserved</p>
    </footer>
    <script src="scripts.js"></script>
</body>
</html>
