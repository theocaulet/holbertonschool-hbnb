<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Place Details</title>
    <link rel="icon" href="images/logo.png">
    <link rel="stylesheet" href="styles.css">
</head>

    <body>
    <header class="site-header">
        <div class="header-left">
            <img src="images/logo.png" alt="Logo" class="logo">
            <span class="brand">HBnB</span>
        </div>
        <nav class="main-nav">
            <a href="index.html">Home</a>
            <a href="login.html" id="login-link" class="login-button">Login</a>
            <button id="logout-button" class="login-button" style="display:none;">Logout</button>
        </nav>
    </header>
    <main class="detail-layout">
        <section id="place-details" class="detail-column">
            <!-- Place details will be populated dynamically -->
        </section>
        <section id="reviews" class="detail-column">
            <!-- Reviews will be populated dynamically -->
        </section>
        <section id="add-review" class="add-review" style="display:none">
            <h2>Add a Review</h2>
            <form id="review-form" class="form">
                <label for="review-text">Review:</label>
                <textarea id="review-text" name="review-text" required></textarea>
                <label for="rating">Rating:</label>
                <select id="rating" name="rating" required>
                    <option value="">Select a rating</option>
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                    <option value="4">4</option>
                    <option value="5">5</option>
                </select>
                <button type="submit">Submit</button>
            </form>
        </section>
    </main>
    <footer>
        <div class="footer-content">
            <div class="footer-section">
                <h3>About us</h3>
                <p>Discover carefully selected places with thoughtful interiors and amenities.</p>
            </div>
            <div class="footer-section">
                <h3>Contact us</h3>
                <p>Email: support@hbnb.com<br>Phone: +1 (555) 123-4567</p>
            </div>
        </div>
        <p class="footer-copy">All rights reserved</p>
    </footer>
    <script src="scripts.js"></script>
</body>
</html>
