<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Review</title>
    <link rel="icon" href="images/logo.png">
    <link rel="stylesheet" href="styles.css">
</head>

    <body>
    <header class="site-header">
        <div class="header-left">
            <img src="images/logo.png" alt="Logo" class="logo">
            <span class="brand">HBnB</span>
        </div>
        <nav class="main-nav">
            <a href="index.html">Home</a>
            <a href="login.html" id="login-link" class="login-button">Login</a>
            <button id="logout-button" class="login-button" style="display:none;">Logout</button>
        </nav>
    </header>
    <main>
        <h1 id="place-name"></h1>
        <section class="add-review">
            <form id="review-form" class="form">
                <h2>Add a Review</h2>
                <label for="review">Your Review:</label>
                <textarea id="review" name="review" required></textarea>
                <label for="rating">Rating:</label>
                <select id="rating" name="rating" required>
                    <option value="">Select a rating</option>
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                    <option value="4">4</option>
                    <option value="5">5</option>
                </select>
                <button type="submit">Submit Review</button>
            </form>
        </section>
    </main>
    <footer>
        <div class="footer-content">
            <div class="footer-section">
                <h3>About us</h3>
                <p>HBnB helps you share feedback and reviews on unforgettable stays.</p>
            </div>
            <div class="footer-section">
                <h3>Contact us</h3>
                <p>Email: support@hbnb.com<br>Phone: +1 (555) 123-4567</p>
            </div>
        </div>
        <p class="footer-copy">All rights reserved</p>
    </footer>
    <script src="scripts.js"></script>
</body>

</html>
